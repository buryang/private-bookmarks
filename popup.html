<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=440">
  <title>Private Bookmarks</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 440px;
      min-height: 300px;
      max-height: 650px;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #1a1a2e;
      color: #eaeaea;
      overflow-y: auto;
    }
    .container { padding: 16px; }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #2a2a4a;
    }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .header-icon { width: 28px; height: 28px; color: #e94560; }
    .header h1 { font-size: 18px; font-weight: 600; color: #eaeaea; }
    .settings-btn {
      background: none;
      border: none;
      color: #a0a0a0;
      cursor: pointer;
      padding: 6px;
      border-radius: 6px;
      transition: all 0.2s;
    }
    .settings-btn:hover { background: #2a2a4a; color: #eaeaea; }
    .locked-view, .unlocked-view { display: none; }
    .unlocked-view.active { display: block; }
    .locked-view.active { display: block; }
    .password-section { text-align: center; padding: 30px 0; }
    .lock-icon-large { width: 48px; height: 48px; color: #e94560; margin-bottom: 16px; }
    .password-section p { color: #a0a0a0; font-size: 14px; margin-bottom: 16px; }
    .input-group { position: relative; margin-bottom: 12px; }
    .input-group input {
      width: 100%;
      padding: 12px 40px 12px 14px;
      border: 1px solid #2a2a4a;
      border-radius: 8px;
      background: #16213e;
      color: #eaeaea;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    .input-group input:focus { border-color: #e94560; }
    .input-group input::placeholder { color: #666; }
    .toggle-password {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: #a0a0a0;
      cursor: pointer;
      padding: 4px;
    }
    .toggle-password:hover { color: #eaeaea; }
    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary { background: #e94560; color: #fff; }
    .btn-primary:hover { background: #d63d56; }
    .btn-secondary { background: #2a2a4a; color: #eaeaea; }
    .btn-secondary:hover { background: #3a3a5a; }
    .btn-small { padding: 8px 16px; font-size: 12px; width: auto; }
    .btn-outline { background: transparent; border: 1px solid #2a2a4a; color: #a0a0a0; }
    .btn-outline:hover { border-color: #e94560; color: #eaeaea; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .error-msg { color: #ff6b6b; font-size: 12px; margin-top: 8px; display: none; }
    .error-msg.show { display: block; }
    .success-msg { color: #4ecca3; font-size: 12px; margin-top: 8px; display: none; }
    .success-msg.show { display: block; }
    .lock-status { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .lock-status span { font-size: 12px; color: #4ecca3; }
    .lock-btn {
      background: #2a2a4a;
      border: none;
      color: #a0a0a0;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .lock-btn:hover { background: #3a3a5a; color: #eaeaea; }
    .bookmark-list { margin-bottom: 16px; max-height: 300px; overflow-y: auto; }
    .folder-group { margin-bottom: 12px; }
    .folder-header {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 12px;
      background: #16213e;
      border-radius: 6px;
      margin-bottom: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      color: #a0a0a0;
    }
    .folder-header:hover { background: #1f2a4a; }
    .folder-header svg { width: 14px; height: 14px; transition: transform 0.2s; }
    .folder-header.collapsed svg { transform: rotate(-90deg); }
    .bookmark-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      background: #16213e;
      border-radius: 8px;
      margin-bottom: 6px;
      cursor: pointer;
      transition: all 0.2s;
      border: 1px solid transparent;
      margin-left: 20px;
    }
    .bookmark-item:hover { border-color: #e94560; }
    .bookmark-item .favicon { width: 16px; height: 16px; margin-right: 10px; flex-shrink: 0; }
    .bookmark-info { flex: 1; min-width: 0; }
    .bookmark-title { font-size: 14px; font-weight: 500; color: #eaeaea; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .bookmark-url { font-size: 12px; color: #a0a0a0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
    .bookmark-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }
    .tag { font-size: 10px; padding: 2px 6px; background: #2a2a4a; border-radius: 4px; color: #a0a0a0; }
    .delete-btn {
      background: none;
      border: none;
      color: #a0a0a0;
      cursor: pointer;
      padding: 6px;
      border-radius: 4px;
      opacity: 0;
      transition: all 0.2s;
      margin-left: 8px;
    }
    .bookmark-item:hover .delete-btn { opacity: 1; }
    .delete-btn:hover { color: #ff6b6b; background: rgba(255, 107, 107, 0.1); }
    .empty-state { text-align: center; padding: 30px 0; color: #a0a0a0; }
    .empty-state svg { width: 40px; height: 40px; margin-bottom: 12px; opacity: 0.5; }
    .add-bookmark-section { border-top: 1px solid #2a2a4a; padding-top: 16px; }
    .add-bookmark-section h3 { font-size: 14px; font-weight: 600; margin-bottom: 12px; color: #a0a0a0; }
    .form-row { margin-bottom: 10px; }
    .form-row input, .form-row select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #2a2a4a;
      border-radius: 8px;
      background: #16213e;
      color: #eaeaea;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-row input:focus, .form-row select:focus { border-color: #e94560; }
    .form-row input[readonly] { background: #0f1525; color: #a0a0a0; }
    .checkbox-group-sm { display: flex; align-items: center; gap: 6px; margin-bottom: 10px; }
    .checkbox-group-sm input[type="checkbox"] { width: 14px; height: 14px; accent-color: #e94560; cursor: pointer; }
    .checkbox-group-sm label { font-size: 12px; color: #a0a0a0; cursor: pointer; }
    .divider { height: 1px; background: #2a2a4a; margin: 16px 0; }
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.7);
      z-index: 100;
      justify-content: center;
      align-items: center;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: #1a1a2e;
      border-radius: 12px;
      padding: 20px;
      width: 400px;
      max-height: 550px;
      overflow-y: auto;
      border: 1px solid #2a2a4a;
    }
    .modal h2 { font-size: 16px; margin-bottom: 16px; color: #eaeaea; }
    .modal-row { margin-bottom: 12px; }
    .modal-row label { display: block; font-size: 12px; color: #a0a0a0; margin-bottom: 4px; }
    .modal-row input, .modal-row select {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #2a2a4a;
      border-radius: 6px;
      background: #16213e;
      color: #eaeaea;
      font-size: 13px;
      outline: none;
    }
    .modal-row input:focus, .modal-row select:focus { border-color: #e94560; }
    .modal-buttons { display: flex; gap: 8px; margin-top: 16px; }
    .modal-buttons .btn { flex: 1; }
    .classification-result { background: #16213e; border-radius: 8px; padding: 12px; margin-bottom: 12px; }
    .classification-result p { font-size: 12px; color: #a0a0a0; margin-bottom: 8px; }
    .classification-result .folder-suggestion { font-size: 14px; color: #4ecca3; margin-bottom: 8px; }
    .classification-result .tags-suggestion { display: flex; flex-wrap: wrap; gap: 4px; }
    .classification-result .tag { font-size: 11px; padding: 3px 8px; background: #2a2a4a; border-radius: 4px; color: #eaeaea; }
    .classifying { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 20px; color: #a0a0a0; }
    .spinner { width: 20px; height: 20px; border: 2px solid #2a2a4a; border-top-color: #e94560; border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #16213e; color: #eaeaea; padding: 10px 16px; border-radius: 8px; font-size: 13px; border: 1px solid #2a2a4a; z-index: 200; opacity: 0; transition: opacity 0.3s; }
    .toast.show { opacity: 1; }
    .toast.success { border-color: #4ecca3; }
    .toast.error { border-color: #ff6b6b; }
    .tab-nav { display: flex; gap: 4px; margin-bottom: 16px; border-bottom: 1px solid #2a2a4a; padding-bottom: 8px; }
    .tab-btn { padding: 8px 16px; background: none; border: none; color: #a0a0a0; cursor: pointer; font-size: 13px; border-radius: 6px; transition: all 0.2s; }
    .tab-btn:hover { background: #2a2a4a; color: #eaeaea; }
    .tab-btn.active { background: #e94560; color: #fff; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .settings-section { margin-bottom: 16px; }
    .settings-section h3 { font-size: 14px; font-weight: 600; margin-bottom: 12px; color: #a0a0a0; }
    .sync-section { display: none; }
    .sync-section.active { display: block; }
    .test-result { margin-top: 8px; padding: 8px; border-radius: 6px; font-size: 12px; display: none; }
    .test-result.success { display: block; background: rgba(78, 204, 163, 0.1); color: #4ecca3; }
    .test-result.error { display: block; background: rgba(255, 107, 107, 0.1); color: #ff6b6b; }
    .toggle-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 12px; background: #16213e; border-radius: 8px; margin-bottom: 12px; }
    .toggle-row label { font-size: 14px; color: #eaeaea; cursor: pointer; }
    .toggle-switch { position: relative; width: 40px; height: 22px; }
    .toggle-switch input { opacity: 0; width: 0; height: 0; }
    .toggle-slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #2a2a4a; transition: 0.3s; border-radius: 22px; }
    .toggle-slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background-color: #eaeaea; transition: 0.3s; border-radius: 50%; }
    .toggle-switch input:checked + .toggle-slider { background-color: #e94560; }
    .toggle-switch input:checked + .toggle-slider:before { transform: translateX(18px); }
    .button-row { display: flex; gap: 8px; margin-top: 12px; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #1a1a2e; }
    ::-webkit-scrollbar-thumb { background: #2a2a4a; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #3a3a5a; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="header-left">
        <svg class="header-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        <h1 data-i18n="extensionName">Private Bookmarks</h1>
      </div>
      <button class="settings-btn" id="settingsBtn" title="Settings">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </div>

    <div class="locked-view active" id="lockedView">
      <div class="password-section">
        <svg class="lock-icon-large" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        <p id="statusText" data-i18n="unlockTitle">Enter your password to access private bookmarks</p>
        <div class="input-group">
          <input type="password" id="passwordInput" placeholder="Enter password" autocomplete="off" data-i18n-placeholder="passwordPlaceholder">
          <button class="toggle-password" id="togglePassword" type="button">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <button class="btn btn-primary" id="unlockBtn" data-i18n="unlockBtn">Unlock</button>
        <p class="error-msg" id="errorMsg" data-i18n="incorrectPassword">Incorrect password</p>
      </div>
    </div>

    <div class="unlocked-view" id="unlockedView">
      <div class="lock-status">
        <span>🔓 <span data-i18n="unlocked">Unlocked</span></span>
        <button class="lock-btn" id="lockBtn" data-i18n="lockBtn">Lock</button>
      </div>
      <div class="bookmark-list" id="bookmarkList">
        <div class="empty-state" id="emptyState">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
          </svg>
          <p data-i18n="noBookmarks">No private bookmarks yet</p>
        </div>
      </div>
      <div class="divider"></div>
      <div class="add-bookmark-section">
        <h3 data-i18n="addBookmarkSection">Add Private Bookmark</h3>
        <div class="form-row">
          <input type="text" id="newTitle" placeholder="Bookmark title" data-i18n-placeholder="titlePlaceholder">
        </div>
        <div class="form-row">
          <input type="url" id="newUrl" placeholder="https://example.com" data-i18n-placeholder="urlPlaceholder">
        </div>
        <div class="form-row" style="display: flex; gap: 8px; align-items: center;">
          <select id="newFolder" style="flex: 1;">
            <option value="Uncategorized">Uncategorized</option>
          </select>
          <button class="btn btn-secondary btn-small" id="addFolderBtn" style="width: auto; padding: 8px 12px;" title="Add New Folder">+</button>
        </div>
        <div class="checkbox-group-sm">
          <input type="checkbox" id="enableAIClassify" checked>
          <label for="enableAIClassify" data-i18n="enableAIClassify">Enable AI classification</label>
        </div>
        <button class="btn btn-primary" id="addBookmarkBtn" data-i18n="addBtn">Add Bookmark</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="settingsModal">
    <div class="modal">
      <h2 data-i18n="settings">Settings</h2>
      <div class="tab-nav">
        <button class="tab-btn active" data-tab="llm" data-i18n="llmSettings">LLM</button>
        <button class="tab-btn" data-tab="sync" data-i18n="syncTab">Sync</button>
        <button class="tab-btn" data-tab="language" data-i18n="languageTab">Language</button>
      </div>

      <div class="tab-content active" id="llmTab">
        <div class="toggle-row">
          <label for="llmEnabled" data-i18n="enableAI">Enable AI Tagging</label>
          <label class="toggle-switch">
            <input type="checkbox" id="llmEnabled">
            <span class="toggle-slider"></span>
          </label>
        </div>
        <div class="settings-section">
          <div class="modal-row">
            <label>Provider</label>
            <select id="llmProvider">
              <option value="openai">OpenAI</option>
              <option value="anthropic">Anthropic Claude</option>
              <option value="gemini">Google Gemini</option>
              <option value="groq">Groq</option>
              <option value="ollama">Ollama (Local)</option>
              <option value="custom">Custom (OpenAI Compatible)</option>
            </select>
          </div>
          <div class="modal-row">
            <label>Base URL</label>
            <input type="text" id="llmBaseUrl" placeholder="https://api.openai.com/v1">
          </div>
          <div class="modal-row">
            <label>API Key</label>
            <input type="password" id="llmApiKey" placeholder="sk-...">
          </div>
          <div class="modal-row">
            <label>Model</label>
            <input type="text" id="llmModel" placeholder="gpt-3.5-turbo">
          </div>
          <div class="checkbox-group-sm" style="margin-top: 12px;">
            <input type="checkbox" id="llmAutoTag">
            <label for="llmAutoTag">Auto-tag on bookmark creation</label>
          </div>
          <div class="button-row">
            <button class="btn btn-secondary btn-small" id="testLlmBtn">Test LLM</button>
          </div>
          <div class="test-result" id="llmTestResult"></div>
        </div>
      </div>

      <div class="tab-content" id="syncTab">
        <div class="toggle-row">
          <label for="syncEnabled" data-i18n="autoSync">Enable Cloud Sync</label>
          <label class="toggle-switch">
            <input type="checkbox" id="syncEnabled">
            <span class="toggle-slider"></span>
          </label>
        </div>
        <div class="settings-section">
          <div class="modal-row">
            <label>Sync Method</label>
            <select id="syncMethod">
              <option value="none">None (Local only)</option>
              <option value="webdav">WebDAV</option>
              <option value="s3">S3 Compatible</option>
              <option value="custom">Custom API</option>
            </select>
          </div>

          <div class="sync-section" id="webdavSettings">
            <div class="modal-row">
              <label>Server URL</label>
              <input type="text" id="webdavUrl" placeholder="https://dav.jianguoyun.com/dav/">
            </div>
            <div class="modal-row">
              <label>Username</label>
              <input type="text" id="webdavUsername">
            </div>
            <div class="modal-row">
              <label>Password</label>
              <input type="password" id="webdavPassword">
            </div>
            <div class="modal-row">
              <label>Remote Path</label>
              <input type="text" id="webdavPath" value="/bookmarks.json">
            </div>
          </div>

          <div class="sync-section" id="s3Settings">
            <div class="modal-row">
              <label>Endpoint</label>
              <input type="text" id="s3Endpoint" placeholder="https://oss-cn-hangzhou.aliyuncs.com">
            </div>
            <div class="modal-row">
              <label>Region</label>
              <input type="text" id="s3Region" placeholder="cn-hangzhou">
            </div>
            <div class="modal-row">
              <label>Access Key</label>
              <input type="text" id="s3AccessKey">
            </div>
            <div class="modal-row">
              <label>Secret Key</label>
              <input type="password" id="s3SecretKey">
            </div>
            <div class="modal-row">
              <label>Bucket</label>
              <input type="text" id="s3Bucket" placeholder="my-bookmarks">
            </div>
            <div class="modal-row">
              <label>Object Key</label>
              <input type="text" id="s3Key" value="bookmarks.json">
            </div>
          </div>

          <div class="sync-section" id="customSettings">
            <div class="modal-row">
              <label>API URL</label>
              <input type="text" id="customApiUrl" placeholder="https://api.example.com/bookmarks">
            </div>
            <div class="modal-row">
              <label>Auth Header (optional)</label>
              <input type="text" id="customAuthHeader" placeholder="Bearer token...">
            </div>
          </div>

          <div class="modal-row" style="margin-top: 16px;">
            <label>Encryption Key</label>
            <input type="password" id="encryptionKey" placeholder="Your encryption key">
          </div>

          <div class="checkbox-group-sm" style="margin-top: 12px;">
            <input type="checkbox" id="autoSync">
            <label for="autoSync">Auto-sync</label>
          </div>

          <div class="modal-row">
            <label>Interval (minutes)</label>
            <select id="syncInterval">
              <option value="1">1</option>
              <option value="5" selected>5</option>
              <option value="10">10</option>
              <option value="30">30</option>
              <option value="60">60</option>
            </select>
          </div>

          <div class="button-row">
            <button class="btn btn-secondary btn-small" id="testSyncBtn">Test Connection</button>
          </div>
          <div class="test-result" id="syncTestResult"></div>

          <p style="margin-top: 12px; font-size: 12px; color: #a0a0a0;">
            <span data-i18n="lastSync">Last sync:</span> <span id="lastSyncTime" data-i18n="never">Never</span>
          </p>
        </div>
      </div>

      <div class="tab-content" id="languageTab">
        <div class="settings-section">
          <div class="modal-row">
            <label>Language</label>
            <select id="languageSelect">
              <option value="en">English</option>
              <option value="zh_CN">简体中文</option>
              <option value="ja">日本語</option>
            </select>
          </div>
        </div>
      </div>

      <div class="modal-buttons">
        <button class="btn btn-secondary btn-small" id="cancelSettingsBtn">Cancel</button>
        <button class="btn btn-primary btn-small" id="saveSettingsBtn">Save</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="classificationModal">
    <div class="modal">
      <h2 data-i18n="aiClassification">AI Classification</h2>
      <div id="classifyingView" class="classifying" style="display: none;">
        <div class="spinner"></div>
        <span data-i18n="analyzing">Analyzing bookmark...</span>
      </div>
      <div id="classificationResult">
        <div class="classification-result">
          <p data-i18n="suggestedFolder">Suggested folder:</p>
          <div class="folder-suggestion" id="suggestedFolder">-</div>
          <p data-i18n="suggestedTags">Suggested tags:</p>
          <div class="tags-suggestion" id="suggestedTags"></div>
        </div>
        <div class="modal-row">
          <label>Folder (editable)</label>
          <input type="text" id="editFolder" placeholder="e.g., Work, Tech, News">
        </div>
        <div class="modal-row">
          <label>Tags (comma-separated, editable)</label>
          <input type="text" id="editTags" placeholder="e.g., important, tutorial">
        </div>
      </div>
      <div class="modal-buttons">
        <button class="btn btn-secondary btn-small" id="skipClassifyBtn">Skip</button>
        <button class="btn btn-primary btn-small" id="confirmClassifyBtn">Confirm</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="newFolderModal">
    <div class="modal">
      <h2>New Folder</h2>
      <div class="modal-row">
        <label>Folder Name</label>
        <input type="text" id="newFolderName" placeholder="e.g., Work, Tech, News">
      </div>
      <div class="modal-buttons">
        <button class="btn btn-secondary btn-small" id="cancelNewFolderBtn">Cancel</button>
        <button class="btn btn-primary btn-small" id="confirmNewFolderBtn">Create</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <script src="popup.js"></script>
</body>
</html>
